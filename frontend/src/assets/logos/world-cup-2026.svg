<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD86B"/>
      <stop offset="50%" stop-color="#FFC72C"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4002B"/>
      <stop offset="50%" stop-color="#003DA5"/>
      <stop offset="100%" stop-color="#00843D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="200" r="190" fill="#001E5A"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>

  <g filter="url(#softShadow)">
    <path d="M140 90 h120 v40 a60 60 0 0 1 -120 0 z" fill="url(#trophyGrad)"/>
    <path d="M140 110 q-30 0 -30 -30 v-15 h30" fill="none" stroke="url(#trophyGrad)" stroke-width="10" stroke-linecap="round"/>
    <path d="M260 110 q30 0 30 -30 v-15 h-30" fill="none" stroke="url(#trophyGrad)" stroke-width="10" stroke-linecap="round"/>
    <path d="M170 165 q30 25 60 0 v40 h-60 z" fill="url(#trophyGrad)"/>
    <rect x="175" y="205" width="50" height="18" rx="3" fill="url(#trophyGrad)"/>
    <rect x="160" y="225" width="80" height="22" rx="4" fill="url(#trophyGrad)"/>
  </g>

  <text x="200" y="295" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="60" font-weight="900" fill="#FFFFFF" letter-spacing="2">FIFA</text>
  <text x="200" y="335" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#FFC72C" letter-spacing="4">WORLD CUP</text>
  <text x="200" y="370" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="6">2026</text>
</svg>
